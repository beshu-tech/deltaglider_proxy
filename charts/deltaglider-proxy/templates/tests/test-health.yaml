apiVersion: v1
kind: Pod
metadata:
  name: {{ include "deltaglider-proxy.fullname" . }}-test-health
  labels:
    {{- include "deltaglider-proxy.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": test
spec:
  restartPolicy: Never
  containers:
    - name: curl
      image: curlimages/curl:8.17.0
      imagePullPolicy: IfNotPresent
      command:
        - sh
        - -ec
        - curl -fsS "http://{{ include "deltaglider-proxy.fullname" . }}:{{ .Values.service.port }}/_/health"
