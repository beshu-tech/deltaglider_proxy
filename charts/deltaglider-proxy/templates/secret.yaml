{{- if and .Values.auth.createSecret (not .Values.auth.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "deltaglider-proxy.secretName" . }}
  labels:
    {{- include "deltaglider-proxy.labels" . | nindent 4 }}
type: Opaque
stringData:
  DGP_ACCESS_KEY_ID: {{ .Values.auth.accessKeyId | quote }}
  DGP_SECRET_ACCESS_KEY: {{ .Values.auth.secretAccessKey | quote }}
  {{- with .Values.auth.bootstrapPasswordHash }}
  DGP_BOOTSTRAP_PASSWORD_HASH: {{ . | quote }}
  {{- end }}
  {{- with .Values.backendCredentials.accessKeyId }}
  DGP_BE_AWS_ACCESS_KEY_ID: {{ . | quote }}
  {{- end }}
  {{- with .Values.backendCredentials.secretAccessKey }}
  DGP_BE_AWS_SECRET_ACCESS_KEY: {{ . | quote }}
  {{- end }}
  {{- range $name, $value := .Values.auth.extraEnv }}
  {{ $name }}: {{ $value | quote }}
  {{- end }}
{{- end }}
