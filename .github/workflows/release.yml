name: Release

on:
  push:
    tags:
      - "v*"

# Deny all permissions at workflow level — each job declares its own
permissions: {}

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: deltaglider_proxy
  DOCKERHUB_REPO: beshultd/deltaglider_proxy
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  # ── Job 1: CI Gate ──────────────────────────────────────────────────
  ci:
    name: CI Gate
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read
      packages: read

  # ── Job 2: Validate ─────────────────────────────────────────────────
  validate:
    name: Validate Release
    needs: ci
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Stamp version from git tag into Cargo.toml
        id: meta
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          echo "Tag version: $TAG_VERSION"

          # Validate semver format
          if ! echo "$TAG_VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+'; then
            echo "::error::Tag $GITHUB_REF_NAME is not valid semver"
            exit 1
          fi

          # Stamp the tag version into Cargo.toml (first version = line)
          sed -i "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

          # Verify it took effect
          CARGO_VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "Cargo.toml now: $CARGO_VERSION"
          if [ "$TAG_VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Failed to stamp version into Cargo.toml"
            exit 1
          fi

          echo "version=$TAG_VERSION" >> "$GITHUB_OUTPUT"

      - name: Verify Cargo.lock is committed
        run: |
          if [ ! -f Cargo.lock ]; then
            echo "::error::Cargo.lock is not committed — release builds require a lockfile"
            exit 1
          fi

      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Dry-run build check
        run: cargo check

  # ── Job 3a: Build Linux x86_64 (self-hosted, builder image) ────────
  build-linux-x86_64:
    name: Build x86_64-unknown-linux-gnu
    needs: validate
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Prepare artifacts
        run: |
          cd target/x86_64-unknown-linux-gnu/release
          strip ${{ env.BINARY_NAME }} || true
          tar czvf ../../../${{ env.BINARY_NAME }}-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.BINARY_NAME }}-x86_64-unknown-linux-gnu
          path: ${{ env.BINARY_NAME }}-v${{ needs.validate.outputs.version }}-x86_64-unknown-linux-gnu.*
          if-no-files-found: error
          retention-days: 1

  # ── Job 3b: Build non-x86_64 targets (GitHub-hosted runners) ───────
  build-other:
    name: Build ${{ matrix.target }}
    needs: validate
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    env:
      # Disable sccache for non-k3s runners (no access to local MinIO)
      RUSTC_WRAPPER: ""
      CARGO_INCREMENTAL: "1"
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux ARM64 (native on Blacksmith ARM)
          - target: aarch64-unknown-linux-gnu
            os: blacksmith-4vcpu-ubuntu-2404-arm

          # macOS x86_64 (Intel)
          - target: x86_64-apple-darwin
            os: macos-latest

          # macOS ARM64 (Apple Silicon)
          - target: aarch64-apple-darwin
            os: macos-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: demo/s3-browser/ui/package-lock.json
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@4be9e76fd7c4901c61fb841f559994984270fce7 # stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        with:
          key: release-${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare artifacts
        run: |
          cd target/${{ matrix.target }}/release
          strip ${{ env.BINARY_NAME }} || true
          tar czvf ../../../${{ env.BINARY_NAME }}-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.tar.gz ${{ env.BINARY_NAME }}

      - name: Upload artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ env.BINARY_NAME }}-${{ matrix.target }}
          path: ${{ env.BINARY_NAME }}-v${{ needs.validate.outputs.version }}-${{ matrix.target }}.*
          if-no-files-found: error
          retention-days: 1

  # ── Job 4: Docker (per-platform native builds + manifest merge) ────
  # Two native builds in parallel (no QEMU), then a manifest job merges them.
  # This cuts ARM64 build time from ~40min (QEMU) to ~6min (native).
  docker-build:
    name: Docker ${{ matrix.platform }}
    needs: validate
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""  # Docker build has its own caching
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: k3s
          - platform: linux/arm64
            runner: blacksmith-4vcpu-ubuntu-2404-arm
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Stamp version from git tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          sed -i'' -e "s/^version = \".*\"/version = \"$TAG_VERSION\"/" Cargo.toml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.DOCKERHUB_REPO }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@14487ce63c7a62a4a324b0bfb37086795e31c6c1 # v6.16.0
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.DOCKERHUB_REPO }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: docker-digest-${{ matrix.platform == 'linux/amd64' && 'amd64' || 'arm64' }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-merge:
    name: Docker manifest merge
    needs: [validate, docker-build]
    runs-on: k3s
    permissions:
      contents: read
    env:
      RUSTC_WRAPPER: ""
    steps:
      - name: Download digests
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: /tmp/digests
          pattern: docker-digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2 # v3.10.0

      - name: Log in to DockerHub
        uses: docker/login-action@74a5d142397b4f367a81961eba4e8cd7edddf772 # v3.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata (tags)
        id: meta
        uses: docker/metadata-action@902fa8ec7d6ecbf8d84d538b9b233a880e428804 # v5.7.0
        with:
          images: ${{ env.DOCKERHUB_REPO }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest

      - name: Create and push manifest
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.DOCKERHUB_REPO }}@sha256:%s ' *)

  # ── Job 5: Release ──────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [validate, build-linux-x86_64, build-other, docker-merge]
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    permissions:
      contents: write
      packages: read
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
          pattern: deltaglider_proxy-*

      - name: Flatten and generate checksums
        run: |
          cd artifacts
          # Move all archives out of per-target subdirectories
          find . -type f -name "*.tar.gz" -exec mv {} . \;
          # Remove now-empty subdirectories
          find . -mindepth 1 -type d -exec rmdir {} + 2>/dev/null || true

          # Fail if no archives were produced
          ARCHIVES=$(ls *.tar.gz 2>/dev/null | wc -l)
          if [ "$ARCHIVES" -eq 0 ]; then
            echo "::error::No release archives found — build may have failed"
            exit 1
          fi
          echo "Found $ARCHIVES release archive(s)"

          sha256sum *.tar.gz 2>/dev/null | sort -k2 > SHA256SUMS.txt
          echo "--- SHA256SUMS.txt ---"
          cat SHA256SUMS.txt

      - name: Generate SBOM
        run: |
          cargo sbom --output-format spdx_json_2_3 > artifacts/sbom-spdx.json
          echo "SBOM generated ($(wc -c < artifacts/sbom-spdx.json) bytes)"

      - name: Attest build provenance
        uses: actions/attest-build-provenance@96278af6caaf10aea03fd8d33a09a777ca52d62f # v3.2.0
        with:
          subject-path: "artifacts/*.tar.gz"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@a06a81a03ee405af7f2048a818ed3f03bbf83c7b # v2.5.0
        with:
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS.txt
            artifacts/sbom-spdx.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
