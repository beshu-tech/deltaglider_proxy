# Full `cargo test --all` against MinIO. Scheduled so PR CI can stay
# a curated fast subset; this catches drift if a crate is dropped from
# the main workflow by mistake.
name: Test all (nightly)

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

concurrency:
  group: test-all-nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  test-all-default-features:
    name: cargo test --all (default features)
    runs-on: k3s
    timeout-minutes: 120
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # See ci.yml `test-integration` for rationale: MinIO under test
      # serves http://localhost:9000, which the wave-1 SSRF guard
      # rejects unless this is set. DGP_REPLAY_WINDOW_SECS=0 disables
      # the wave-3 GET/HEAD replay cache for tests that legitimately
      # re-issue identical signed requests inside the default 2s
      # window.
      DGP_BACKEND_ALLOW_LOCAL: "true"
      DGP_REPLAY_WINDOW_SECS: "0"
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Clean stale config DB artifacts
        run: |
          rm -f deltaglider_config.db deltaglider_config.db.bak .deltaglider_bootstrap_hash
          rm -f /tmp/deltaglider_config.db /tmp/deltaglider_config.db.bak /tmp/.deltaglider_bootstrap_hash
      - name: Start MinIO
        run: |
          docker run -d --name minio-nightly --network container:$(hostname) \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
            sleep 1
          done
          mc mb --ignore-existing local/deltaglider-test
          mc mb --ignore-existing local/deltaglider-data
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
      - name: cargo test --all --locked
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --all --locked -- --nocapture
      - name: Stop MinIO
        if: always()
        run: docker rm -f minio-nightly 2>/dev/null || true

  # ── Moved off the PR critical path (were `continue-on-error` on ci.yml,
  #    i.e. non-gating). Coverage re-runs the whole --lib suite under
  #    instrumentation; supply-chain drift is a daily concern, not per-commit.
  #    Tools (cargo-llvm-cov, cargo-deny) are baked into the builder image. ──
  coverage:
    name: Unit Coverage (nightly)
    runs-on: k3s
    timeout-minutes: 20
    continue-on-error: true
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Run lib tests under llvm-cov
        env:
          RUST_BACKTRACE: "1"
        run: cargo llvm-cov --locked --lib --no-report
      - name: Emit summary table (top 20 worst-covered files)
        run: |
          cargo llvm-cov report --summary-only > /tmp/cov-summary.txt
          echo "## Unit-test coverage summary" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat /tmp/cov-summary.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "### Worst-covered files (line %)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cargo llvm-cov report \
            | awk 'NR>2 && $1 !~ /^TOTAL/ && $1 !~ /^-/ {gsub(/%/, "", $10); printf "%6s  %s\n", $10, $1}' \
            | sort -n | head -20 >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
      - name: Upload lcov artifact
        if: always()
        run: cargo llvm-cov report --lcov --output-path /tmp/lcov.info || true
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: lcov-coverage
          path: /tmp/lcov.info
          if-no-files-found: ignore

  supply-chain:
    name: Supply-chain (audit + deny)
    runs-on: k3s
    timeout-minutes: 10
    continue-on-error: true
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      RUSTC_WRAPPER: ""  # metadata-only checks, no compile
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo audit
        run: cargo audit
      - name: cargo deny check
        run: cargo deny check 2>&1 || true

