name: marketing-pages

on:
  push:
    branches: [main]
    paths:
      - 'marketing/**'
      - 'docs/screenshots/**'
      - '.github/workflows/marketing-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: marketing/package-lock.json

      - name: Install
        working-directory: marketing
        run: npm ci

      - name: Typecheck
        working-directory: marketing
        run: npm run typecheck

      - name: Build (SSG + sitemap + SEO smoke test)
        working-directory: marketing
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: marketing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
