name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}/builder:latest
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  fmt:
    name: Rustfmt
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo fmt
        env:
          RUSTC_WRAPPER: ""  # fmt doesn't need sccache
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  test-unit:
    name: Unit Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo test --lib
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --lib --locked -- --nocapture
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  test-fast:
    name: Integration Tests (fast)
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Start MinIO for tests
        run: |
          docker run -d --name minio-ci --network container:$(hostname) \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
            sleep 1
          done
          mc mb --ignore-existing local/deltaglider-test
          mc mb --ignore-existing local/deltaglider-data
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
      - name: Install DeltaGlider CLI
        run: |
          command -v pip3 >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null; }
          pip3 install --quiet --break-system-packages deltaglider
          deltaglider --version
      - name: Fast integration tests
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --test auth_integration_test -- --nocapture
          cargo test --locked --test concurrency_test -- --nocapture
          cargo test --locked --test error_test -- --nocapture
          cargo test --locked --test iam_authorization_test -- --nocapture
          cargo test --locked --test iam_persona_test -- --nocapture
          cargo test --locked --test iam_test -- --nocapture
          cargo test --locked --test interop_test -- --include-ignored --nocapture
          cargo test --locked --test list_truncation_test -- --nocapture
          cargo test --locked --test metadata_validation_test -- --nocapture
          cargo test --locked --test s3_api_test -- --nocapture
          cargo test --locked --test s3_backend_test -- --nocapture
          cargo test --locked --test s3_compat_test -- --nocapture
          cargo test --locked --test s3_integration_test -- --nocapture
          cargo test --locked --test storage_resilience_test -- --nocapture
          cargo test --locked --test unmanaged_objects_test -- --nocapture
      - name: Clean up MinIO test data
        if: always()
        run: |
          mc rm --recursive --force local/deltaglider-test/ 2>/dev/null || true
          mc rm --recursive --force local/deltaglider-data/ 2>/dev/null || true
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats
      - name: Stop MinIO
        if: always()
        run: docker rm -f minio-ci 2>/dev/null || true

  test-slow:
    name: Integration Tests (slow - delta/optimization)
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Slow integration tests (delta encoding, optimization)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --test delta_test -- --nocapture
          cargo test --locked --test optimization_test -- --nocapture
          cargo test --locked --test memory_test -- --nocapture
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  audit:
    name: RustSec Audit
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo audit
        env:
          RUSTC_WRAPPER: ""  # audit doesn't compile
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true  # warn-only until config stabilises
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-deny
        env:
          RUSTC_WRAPPER: ""
        run: cargo install --locked cargo-deny 2>/dev/null || echo "cargo-deny install failed (non-blocking)"
      - name: cargo deny check
        env:
          RUSTC_WRAPPER: ""
        run: cargo deny check 2>&1 || true

  frontend-lint:
    name: Frontend Lint
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: cd demo/s3-browser/ui && npm ci
      - name: TypeScript type check
        run: cd demo/s3-browser/ui && npx tsc --noEmit || true  # warn-only (recharts types missing)
      - name: npm audit
        run: cd demo/s3-browser/ui && npm audit --audit-level=high || true  # warn-only
