  docs:
    name: Docs bundling + link check + YAML examples
    runs-on: k3s
    needs: build-bin
    # The from-scratch release build (the old dominant cost) is gone — the
    # config-lint now consumes the shared build-bin artifact. Only the docs
    # registry/changelog guards + the hard-capped, warn-only lychee link
    # check remain, so the ceiling can be modest.
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # ── Blocking: every .md under docs/product/ is registered in
      #    demo/s3-browser/ui/src/docs-imports.ts, and no dev docs
      #    (docs/dev/**) sneak into the product bundle. ──
      - name: Docs registry allow-list
        run: ./scripts/check-docs-registry.sh
      # ── Blocking: the bundled changelog doc (docs/product/changelog.md)
      #    is generated from the root CHANGELOG.md. Fail if it drifted —
      #    run scripts/gen-changelog-doc.sh and commit. ──
      - name: Changelog doc in sync with CHANGELOG.md
        run: ./scripts/gen-changelog-doc.sh --check
      # ── Blocking: every `# validate`-tagged fenced YAML block in
      #    docs/product/**/*.md parses + validates under the real
      #    schema. Prevents example drift. Uses the shared binary artifact
      #    from build-bin instead of a from-scratch release compile. ──
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: dgp-bin
          path: target/release
      - name: Restore binary perms
        run: chmod +x target/release/deltaglider_proxy
      - name: Validate docs YAML examples
        env:
          DELTAGLIDER_PROXY_BIN: ./target/release/deltaglider_proxy
        run: ./scripts/check-docs-yaml-examples.sh
      # ── Non-blocking: inter-doc link check.
      #    lycheeverse/lychee-action needs to install a binary at
      #    runtime, and our container (ghcr.io/.../builder) doesn't
      #    ship with the tools it expects — hit exit 127 on v0.8.8.
      #    Until we bake lychee into the builder image (follow-up),
      #    run it via `cargo install --locked lychee` here. If the
      #    install fails (rust version drift, network), treat it
      #    as warn-only so the registry + YAML guards above still
      #    gate the release.
      - name: Link check (lychee, warn-only)
        # Hard-capped at 4 min. This step is WARN-ONLY (broken links never fail
        # the build), but it both compiles lychee from source AND makes live
        # network requests to external doc URLs — either can hang and was the
        # cause of repeated job-level timeouts (cancelling green release runs).
        # `timeout` bounds the whole thing; on expiry we just warn and move on.
        timeout-minutes: 4
        continue-on-error: true
        env:
          RUSTC_WRAPPER: ""
        run: |
          set +e
          # lychee is baked into the builder image; fall back to a from-source
          # install only if this container predates that (transitional).
          if ! command -v lychee >/dev/null 2>&1; then
            timeout 210 cargo install --locked --quiet lychee || {
              echo "::warning::lychee not baked and install failed/timed out; skipping link check"
              exit 0
            }
          fi
          timeout 60 lychee --no-progress --accept 200,204,301,302,429 \
            --timeout 20 --max-retries 2 --exclude-mail \
            'docs/product/**/*.md' || {
            echo "::warning::lychee found broken links or timed out; review the log"
          }
          exit 0

  config-schema:
    name: Config JSON Schema
    runs-on: k3s
    needs: build-bin
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: dgp-bin
          path: target/release
      - name: Restore binary perms
        run: chmod +x target/release/deltaglider_proxy
      - name: Generate canonical JSON Schema
        run: |
          mkdir -p schema
          ./target/release/deltaglider_proxy config schema --out schema/deltaglider.schema.json
          echo "--- schema head ---"
          head -40 schema/deltaglider.schema.json
      - name: Lint the canonical example config
        run: |
          # YAML is the only config format (TOML removed in v1.4.1).
          # The shipped example must always pass offline validation.
          ./target/release/deltaglider_proxy config lint deltaglider_proxy.example.yaml
      - name: Upload schema artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deltaglider-config-schema
          path: schema/deltaglider.schema.json
