name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}/builder:latest
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  fmt:
    name: Rustfmt
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo fmt
        env:
          RUSTC_WRAPPER: ""  # fmt doesn't need sccache
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo clippy
        run: cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  # ── Test jobs: split into 3 parallel groups for ~3x faster wall-clock ──
  # Each job compiles via sccache (near-instant after first job populates cache).
  # Split by execution time: unit (~60s), integration-fast (~50s), integration-slow (~70s).

  test-unit:
    name: Unit Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: cargo test --lib
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --lib --locked

  test-integration:
    name: Integration Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Clean up stale config DB files
        run: |
          rm -f deltaglider_config.db deltaglider_config.db.bak .deltaglider_bootstrap_hash
          rm -f /tmp/deltaglider_config.db /tmp/deltaglider_config.db.bak /tmp/.deltaglider_bootstrap_hash
      - name: Start MinIO for tests
        run: |
          docker run -d --name minio-ci --network container:$(hostname) \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
            sleep 1
          done
          mc mb --ignore-existing local/deltaglider-test
          mc mb --ignore-existing local/deltaglider-data
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
      - name: Install DeltaGlider CLI
        run: |
          command -v pip3 >/dev/null 2>&1 || { apt-get update -qq && apt-get install -y -qq python3-pip >/dev/null; }
          pip3 install --quiet --break-system-packages deltaglider
          deltaglider --version
      - name: Integration tests (fast)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test auth_integration_test \
            --test concurrency_test \
            --test error_test \
            --test iam_authorization_test \
            --test iam_persona_test \
            --test iam_test \
            --test list_truncation_test \
            --test metadata_validation_test \
            --test s3_api_test \
            --test s3_backend_test \
            --test s3_compat_test \
            --test s3_integration_test \
            --test storage_resilience_test \
            --test unmanaged_objects_test \
            -- --nocapture
      - name: Interop tests (spawns proxy subprocesses)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --test interop_test -- --include-ignored --nocapture
      - name: Clean up MinIO test data
        if: always()
        run: |
          mc rm --recursive --force local/deltaglider-test/ 2>/dev/null || true
          mc rm --recursive --force local/deltaglider-data/ 2>/dev/null || true
      - name: Stop MinIO
        if: always()
        run: docker rm -f minio-ci 2>/dev/null || true

  test-delta:
    name: Delta & Optimization Tests
    runs-on: k3s
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Delta, optimization, and memory tests
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test delta_test \
            --test optimization_test \
            --test memory_test \
            -- --nocapture

  audit:
    name: RustSec Audit
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo audit
        env:
          RUSTC_WRAPPER: ""  # audit doesn't compile
        run: cargo audit

  deny:
    name: Cargo Deny
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    continue-on-error: true  # warn-only until config stabilises
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install cargo-deny
        env:
          RUSTC_WRAPPER: ""
        run: cargo install --locked cargo-deny 2>/dev/null || echo "cargo-deny install failed (non-blocking)"
      - name: cargo deny check
        env:
          RUSTC_WRAPPER: ""
        run: cargo deny check 2>&1 || true

  frontend-lint:
    name: Frontend Lint
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: cd demo/s3-browser/ui && npm ci
      # ── Blocking: ESLint with react-hooks/rules-of-hooks at error.
      #    A regression of error #310 (hooks after early returns) is
      #    caught here, before it ever ships. Warnings are still
      #    visible in logs but don't fail CI — warn budget is being
      #    managed down separately (see lint:strict). ──
      - name: ESLint (rules-of-hooks, no-unused-vars, ...)
        run: cd demo/s3-browser/ui && npm run lint
      # ── Blocking: TypeScript. `recharts` types no longer break this. ──
      - name: TypeScript type check
        run: cd demo/s3-browser/ui && npm run typecheck
      # ── Blocking: Knip detects unused files, deps, and exports. ──
      - name: Knip (dead code / unused deps)
        run: cd demo/s3-browser/ui && npm run knip
      - name: npm audit
        run: cd demo/s3-browser/ui && npm audit --audit-level=high || true  # warn-only

  docs:
    name: Docs bundling + link check + YAML examples
    runs-on: k3s
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      # ── Blocking: every .md under docs/product/ is registered in
      #    demo/s3-browser/ui/src/docs-imports.ts, and no dev docs
      #    (docs/dev/**) sneak into the product bundle. ──
      - name: Docs registry allow-list
        run: ./scripts/check-docs-registry.sh
      # ── Blocking: every `# validate`-tagged fenced YAML block in
      #    docs/product/**/*.md parses + validates under the real
      #    schema. Prevents example drift. Needs a built binary. ──
      - name: Build deltaglider_proxy (for config lint)
        env:
          RUSTC_WRAPPER: ""
        run: cd demo/s3-browser/ui && npm ci && npm run build && cd ../../.. && cargo build --locked --release --bin deltaglider_proxy
      - name: Validate docs YAML examples
        env:
          DELTAGLIDER_PROXY_BIN: ./target/release/deltaglider_proxy
        run: ./scripts/check-docs-yaml-examples.sh
      # ── Non-blocking: inter-doc link check.
      #    lycheeverse/lychee-action needs to install a binary at
      #    runtime, and our container (ghcr.io/.../builder) doesn't
      #    ship with the tools it expects — hit exit 127 on v0.8.8.
      #    Until we bake lychee into the builder image (follow-up),
      #    run it via `cargo install --locked lychee` here. If the
      #    install fails (rust version drift, network), treat it
      #    as warn-only so the registry + YAML guards above still
      #    gate the release.
      - name: Link check (lychee, warn-only)
        env:
          RUSTC_WRAPPER: ""
        run: |
          set +e
          cargo install --locked --quiet lychee || {
            echo "::warning::cargo install lychee failed; skipping link check"
            exit 0
          }
          lychee --no-progress --accept 200,204,301,302,429 \
            --timeout 20 --max-retries 2 --exclude-mail \
            'docs/product/**/*.md' || {
            echo "::warning::lychee found broken links; review the log"
          }
          exit 0

  config-schema:
    name: Config JSON Schema
    runs-on: k3s
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI (required by rust-embed)
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - name: Generate canonical JSON Schema
        run: |
          mkdir -p schema
          cargo run --locked --quiet -- config schema --out schema/deltaglider.schema.json
          echo "--- schema head ---"
          head -40 schema/deltaglider.schema.json
      - name: Verify schema accepts migrated example
        run: |
          cargo run --locked --quiet -- config migrate deltaglider_proxy.toml.example \
            --out /tmp/migrated.yaml
          # Round-trip check: loading the migrated YAML must succeed.
          cargo run --locked --quiet -- config migrate /tmp/migrated.yaml \
            --out /tmp/roundtrip.yaml
          diff /tmp/migrated.yaml /tmp/roundtrip.yaml
      - name: Upload schema artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: deltaglider-config-schema
          path: schema/deltaglider.schema.json
