name: CI

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: read

env:
  BUILDER_IMAGE: ghcr.io/${{ github.repository }}/builder:latest
  # ── sccache: local MinIO compilation cache (NOT the CI test MinIO) ──
  RUSTC_WRAPPER: sccache
  CARGO_INCREMENTAL: "0"
  SCCACHE_BUCKET: sccache-rust
  SCCACHE_ENDPOINT: http://sccache-minio.sccache.svc.cluster.local:9000
  SCCACHE_REGION: auto
  SCCACHE_S3_USE_SSL: "false"
  AWS_ACCESS_KEY_ID: sccache
  AWS_SECRET_ACCESS_KEY: sccache-secret-key

jobs:
  # ── Build-once, consume-many ─────────────────────────────────────────
  # The demo UI dist/ (rust-embed input) and the release binary were each
  # rebuilt in ~8 and ~3 downstream jobs respectively. Build each ONCE here
  # and pass as an artifact; consumers `needs:` + download instead of
  # re-running `npm ci` / `cargo build --release`.
  build-ui:
    name: Build UI (dist artifact)
    runs-on: k3s
    timeout-minutes: 10
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Build demo UI
        run: cd demo/s3-browser/ui && npm ci && npm run build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
          if-no-files-found: error
          retention-days: 1

  build-bin:
    name: Build release binary (artifact)
    runs-on: k3s
    timeout-minutes: 20
    needs: build-ui
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
      - name: cargo build --release (sccache warm — same cache as the test jobs)
        env:
          RUST_BACKTRACE: "1"
        run: cargo build --locked --release --bin deltaglider_proxy
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dgp-bin
          path: target/release/deltaglider_proxy
          if-no-files-found: error
          retention-days: 1

  verify-integration-test-registry:
    name: Integration test registry
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify tests/*.rs map to CI --test flags
        run: ./scripts/check-integration-tests-in-ci.sh

  verify-spdx-headers:
    name: SPDX license headers
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Every .rs file must have SPDX-License-Identifier
        run: ./scripts/check-spdx-headers.sh

  verify-no-committed-secrets:
    name: No committed secrets
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: No live secrets / secret artifacts in the tracked tree
        run: ./scripts/check-no-committed-secrets.sh

  verify-savings-math-dry:
    name: Savings math DRY guard
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Forbid inline savings math outside the central modules
        run: ./scripts/check-savings-math.sh

  fmt:
    name: Rustfmt
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: cargo fmt
        env:
          RUSTC_WRAPPER: ""  # fmt doesn't need sccache
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: k3s
    needs: build-ui
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: sccache stats (pre)
        run: sccache --show-stats
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
      - name: cargo clippy (with sccache bypass + diagnostic capture)
        shell: bash
        env:
          RUSTC_WRAPPER: ""
        run: |
          set +e
          # Write a heartbeat to step summary FIRST so we can at least
          # confirm the step ran even if everything after fails.
          {
            echo "## Clippy diagnostic"
            echo ""
            echo "**Heartbeat:** step started at $(date -u)"
            echo ""
            echo "### Toolchain"
            echo '```'
            rustc --version 2>&1 || echo "rustc --version failed: $?"
            cargo --version 2>&1 || echo "cargo --version failed: $?"
            which cargo-clippy 2>&1 || echo "no cargo-clippy on PATH"
            echo '```'
            echo ""
            echo "### Disk"
            echo '```'
            df -h /github /home /tmp 2>&1 | head -10 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          cargo clippy --locked --all-targets --all-features -- -D warnings 2>&1 | tee /tmp/clippy.log
          rc=${PIPESTATUS[0]}

          {
            echo ""
            echo "### Clippy output (exit $rc)"
            echo '```'
            tail -200 /tmp/clippy.log
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          exit $rc
      - name: sccache stats (post)
        if: always()
        run: sccache --show-stats

  # ── Test jobs: split into 3 parallel groups for ~3x faster wall-clock ──
  # Each job compiles via sccache (near-instant after first job populates cache).
  # Split by execution time: unit (~60s), integration-fast (~50s), integration-slow (~70s).

  test-unit:
    name: Unit Tests
    runs-on: k3s
    needs: build-ui
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
      - name: cargo test --lib
        env:
          RUST_BACKTRACE: "1"
        run: cargo test --lib --locked

  test-integration:
    name: Integration Tests
    # Always run on PRs (review gate), workflow_dispatch (operator opt-in),
    # and workflow_call (downstream caller). On direct push to main the
    # MinIO suite is skipped UNLESS the commit message contains
    # `[ci-integration]` — opt-in keyword so noisy main-branch chores
    # don't burn ~10 minutes of MinIO time when they don't need it.
    if: >-
      github.event_name != 'push' ||
      contains(github.event.head_commit.message, '[ci-integration]')
    runs-on: k3s
    needs: build-ui
    timeout-minutes: 50
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    env:
      # Wave-1 security (commit 3ff9edc) rejects http:// + private-IP S3
      # endpoints by default to close SSRF surface. The MinIO under test
      # serves on http://localhost:9000, so we explicitly opt in here.
      # The CLI's `engine_factory` auto-sets this when it detects a
      # MinIO/dev endpoint; the proxy's `S3Backend::build_client` does
      # NOT, because the proxy is the thing being hardened.
      DGP_BACKEND_ALLOW_LOCAL: "true"
      # Wave-3 security (commit 9f2e085) caches GET/HEAD SigV4
      # signatures and rejects duplicates inside a 2s window — the
      # default. Tests legitimately re-issue the same signed request
      # within a second (assertion-style verifications) and the AWS
      # SDK signs at one-second timestamp granularity, so two HEADs
      # in the same second collide. Disable replay detection in CI
      # only; production keeps the default.
      DGP_REPLAY_WINDOW_SECS: "0"
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
      - name: Clean up stale config DB files
        run: |
          rm -f deltaglider_config.db deltaglider_config.db.bak .deltaglider_bootstrap_hash
          rm -f /tmp/deltaglider_config.db /tmp/deltaglider_config.db.bak /tmp/.deltaglider_bootstrap_hash
      - name: Start MinIO for tests
        run: |
          docker run -d --name minio-ci --network container:$(hostname) \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio:latest server /data
          for i in $(seq 1 30); do
            mc alias set local http://localhost:9000 minioadmin minioadmin 2>/dev/null && break
            sleep 1
          done
          mc mb --ignore-existing local/deltaglider-test
          mc mb --ignore-existing local/deltaglider-data
          echo "MINIO_ENDPOINT=http://localhost:9000" >> $GITHUB_ENV
      - name: Install DeltaGlider CLI
        env:
          DEBIAN_FRONTEND: noninteractive
          PIP_DISABLE_PIP_VERSION_CHECK: "1"
        run: |
          if ! python3 -m pip --version >/dev/null 2>&1; then
            apt-get update -qq
            apt-get install -y -qq python3-pip
          fi
          python3 -m pip install --quiet --break-system-packages deltaglider
          deltaglider --version
      - name: Integration tests (fast)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test bootstrap_password_hash_invariant_test \
            --test auth_integration_test \
            --test concurrency_test \
            --test error_test \
            --test iam_authorization_test \
            --test iam_persona_test \
            --test iam_test \
            --test list_truncation_test \
            --test metadata_validation_test \
            --test s3_api_test \
            --test s3_backend_test \
            --test s3_compat_test \
            --test s3_integration_test \
            --test storage_resilience_test \
            --test unmanaged_objects_test \
            -- --nocapture
      - name: Interop tests (spawns proxy subprocesses)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked --test interop_test -- --include-ignored --nocapture
      - name: Integration tests (admin, IAM, replication, lifecycle, …)
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test admin_bulk_objects_test \
            --test browser_session_connect_test \
            --test admin_config_test \
            --test admin_login_as_test \
            --test admin_section_test \
            --test bucket_existence_test \
            --test cli_admin_test \
            --test cli_s3_bucket_acl_test \
            --test cli_s3_cp_test \
            --test cli_s3_ls_test \
            --test cli_s3_migrate_test \
            --test cli_s3_purge_test \
            --test cli_s3_rm_test \
            --test cli_s3_stats_test \
            --test cli_s3_sync_test \
            --test cli_s3_verify_test \
            --test backend_capability_gate_test \
            --test config_sync_ha_test \
            --test config_sync_test \
            --test coordination_lease_test \
            --test encryption_test \
            --test external_auth_test \
            --test iam_declarative_reconcile_test \
            --test iam_identity_test \
            --test iam_mode_test \
            --test iam_variables_clone_test \
            --test lifecycle_test \
            --test maintenance_reencrypt_test \
            --test migrate_job_test \
            --test mismatch_boot_test \
            --test quota_test \
            --test replication_target_only_test \
            --test replication_test \
            --test delta_passthrough_test \
            --test streaming_copy_test \
            --test generation_pin_test \
            --test large_object_e2e_test \
            --test parity_test \
            --test savings_test \
            --test bucket_usage_test \
            --test logs_test \
            --test admission_test \
            --test aws_chunked_upload_test \
            --test iam_list_scope_test \
            --test multipart_etag_test \
            --test public_prefix_list_test \
            --test public_prefix_test \
            --test recursive_delete_test \
            --test s3_correctness_test \
            -- --nocapture
      - name: Clean up MinIO test data
        if: always()
        run: |
          mc rm --recursive --force local/deltaglider-test/ 2>/dev/null || true
          mc rm --recursive --force local/deltaglider-data/ 2>/dev/null || true
      - name: Stop MinIO
        if: always()
        run: docker rm -f minio-ci 2>/dev/null || true

  test-delta:
    name: Delta & Optimization Tests
    runs-on: k3s
    needs: build-ui
    timeout-minutes: 15
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: ui-dist
          path: demo/s3-browser/ui/dist
      - name: Delta, optimization, and memory tests
        env:
          RUST_BACKTRACE: "1"
        run: |
          cargo test --locked \
            --test delta_test \
            --test optimization_test \
            --test memory_test \
            -- --nocapture

  e2e-smoke:
    name: E2E smoke (embedded UI)
    runs-on: k3s
    needs: build-bin
    timeout-minutes: 35
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/download-artifact@448e3f862ab3ef47aa50ff917776823c9946035b # v6.0.0
        with:
          name: dgp-bin
          path: target/release
      - name: Restore binary perms + install Playwright deps
        run: |
          chmod +x target/release/deltaglider_proxy
          cd demo/s3-browser/ui && npm ci
      - name: Install Playwright Chromium
        run: |
          cd demo/s3-browser/ui
          npx playwright install chromium --with-deps
      - name: Smoke test /_/ shell + /_/health
        env:
          DELTAGLIDER_PROXY_BIN: ${{ github.workspace }}/target/release/deltaglider_proxy
        run: ./scripts/e2e-smoke.sh

  frontend-lint:
    name: Frontend Lint
    runs-on: k3s
    container:
      image: ghcr.io/beshu-tech/deltaglider_proxy/builder:latest
      # Raise the open-file limit. These jobs run on the self-hosted
      # `k3s`-labelled Ryzen LXC runners, where the container inherits a low
      # default nofile (~1024). The integration suite spawns ~35 test
      # binaries in parallel, each with its own proxy + MinIO sockets, so the
      # aggregate fd count blows past 1024 and surfaces as
      # `ConnectError("tcp open error", Os code 24 "Too many open files")`.
      # The LXC host also bumps nofile (lxc.prlimit.nofile) — this is the
      # belt-and-suspenders so the workflow is self-documenting and portable.
      options: --ulimit nofile=1048576:1048576
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Scrub stale workspace (drop .claude leftovers from prior runs)
        shell: bash
        run: |
          rm -rf .claude/worktrees .git/modules/.claude 2>/dev/null || true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install dependencies
        run: cd demo/s3-browser/ui && npm ci
      # ── Blocking: ESLint with react-hooks/rules-of-hooks at error.
      #    A regression of error #310 (hooks after early returns) is
      #    caught here, before it ever ships. Warnings are still
      #    visible in logs but don't fail CI — warn budget is being
      #    managed down separately (see lint:strict). ──
      - name: ESLint (rules-of-hooks, no-unused-vars, ...)
        run: cd demo/s3-browser/ui && npm run lint
      # ── Blocking: TypeScript. `recharts` types no longer break this. ──
      - name: TypeScript type check
        run: cd demo/s3-browser/ui && npm run typecheck
      # ── Blocking: Knip detects unused files, deps, and exports. ──
      - name: Knip (dead code / unused deps)
        run: cd demo/s3-browser/ui && npm run knip
      - name: Node regression scripts (permissions + storage paths + page size)
        run: |
          cd demo/s3-browser/ui
          npm run test:permissions
          npm run test:storage-path
          npm run test:page-size
          npm run test:condition-prefix-rows
          npm run test:advanced-merge-patch
          npm run test:permission-conditions
          npm run test:permission-warnings
