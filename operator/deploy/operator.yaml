# The DeltaGlider operator itself: namespace, RBAC, and one controller pod.
# Apply crd.yaml first, then this file.
apiVersion: v1
kind: Namespace
metadata:
  name: deltaglider-system
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: deltaglider-operator
  namespace: deltaglider-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: deltaglider-operator
rules:
  - apiGroups: ["deltaglider.beshu.tech"]
    resources: ["deltagliderproxies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["deltaglider.beshu.tech"]
    resources: ["deltagliderproxies/status"]
    verbs: ["get", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets", "deployments"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: [""]
    resources: ["services", "configmaps"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["policy"]
    resources: ["poddisruptionbudgets"]
    verbs: ["get", "list", "watch", "create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: deltaglider-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: deltaglider-operator
subjects:
  - kind: ServiceAccount
    name: deltaglider-operator
    namespace: deltaglider-system
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: deltaglider-operator
  namespace: deltaglider-system
  labels:
    app.kubernetes.io/name: deltaglider-operator
spec:
  # Single instance by design: no leader election. Do not scale this Deployment;
  # two operators SSA-fighting the same children causes needless churn.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: deltaglider-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: deltaglider-operator
    spec:
      serviceAccountName: deltaglider-operator
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
      containers:
        - name: operator
          image: beshultd/deltaglider-operator:0.1.0
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 256Mi
